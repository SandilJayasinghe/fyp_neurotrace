name: Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Digital Ocean Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script: |
            echo "Moving to project directory..."
            cd ~/fyp_neurotrace || exit 1
            
            echo "Syncing code..."
            git pull origin main || exit 1
            
            echo "Updating Python environment..."
            # Using 'source' is often more robust in CI environments
            source neurotrace_app/backend/venv/bin/activate || exit 1
            pip install -r neurotrace_app/backend/requirements.txt --upgrade --quiet || exit 1
            
            echo "Restarting service..."
            # Added sudo to ensure the service actually restarts
            sudo systemctl restart tremora || exit 1
            
            echo "Deploy complete"
